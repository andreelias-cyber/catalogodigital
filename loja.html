<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Online</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --blue:#1a3c5e;--yellow:#f5a623;--yellow2:#e8891a;
  --bg:#f4f5f7;--white:#fff;--border:#e8e8e8;
  --text:#1a1a1a;--muted:#666;--light:#f9f9f9;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
header{background:var(--blue);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px}
.store-name{font-size:16px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-wrap{flex:2;max-width:500px;position:relative}
.search-wrap input{width:100%;padding:9px 16px 9px 40px;border:none;border-radius:8px;font-size:14px;background:rgba(255,255,255,.12);color:#fff;outline:none;transition:background .2s}
.search-wrap input::placeholder{color:rgba(255,255,255,.5)}
.search-wrap input:focus{background:rgba(255,255,255,.2)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.6;pointer-events:none}
.cart-btn{background:var(--yellow);color:#000;border:none;border-radius:8px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;transition:background .15s}
.cart-btn:hover{background:var(--yellow2)}
.cart-badge{background:#000;color:var(--yellow);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800}

/* LOADING */
#loadScreen{position:fixed;inset:0;z-index:2000;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.load-logo{font-size:22px;font-weight:800;color:#fff}
.load-logo span{color:var(--yellow)}
.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,.2);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadMsg{font-size:14px;color:rgba(255,255,255,.55)}
.load-bar{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.load-fill{height:100%;background:var(--yellow);border-radius:3px;width:0%;transition:width .4s}

/* ERROR */
#errScreen{display:none;position:fixed;inset:0;z-index:2000;background:var(--blue);align-items:center;justify-content:center;flex-direction:column;gap:12px;text-align:center;padding:40px}
#errScreen h2{color:#fff;font-size:20px}
#errScreen p{color:rgba(255,255,255,.5);font-size:14px}

/* MAIN */
main{max-width:1400px;margin:0 auto;padding:20px}
.stats-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;font-size:13px;color:var(--muted);flex-wrap:wrap;gap:8px}
.stats-bar b{color:var(--text)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
@media(max-width:1100px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:760px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}}
@media(max-width:400px){.grid{grid-template-columns:repeat(2,1fr);gap:8px}}

/* PRODUCT CARD */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;transition:transform .15s,box-shadow .15s;border:1px solid var(--border)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(0,0,0,.12)}
.card-img{width:100%;aspect-ratio:4/3;object-fit:contain;background:var(--white);padding:10px;border-bottom:1px solid var(--border);transition:transform .2s}
.card:hover .card-img{transform:scale(1.03)}
.card-img.placeholder{display:flex;align-items:center;justify-content:center;font-size:40px;color:#ddd;background:var(--light)}
.card-body{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px}
.card-code{font-size:10px;color:var(--muted);font-weight:500}
.card-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;flex:1}
.card-desc{font-size:11px;color:var(--muted);line-height:1.4;margin-top:2px}
.card-price{font-size:18px;font-weight:800;color:var(--blue);margin-top:8px}
.card-price.no-price{font-size:13px;color:var(--muted);font-weight:500}
.card-footer{padding:0 12px 12px}
.add-btn{width:100%;background:var(--blue);color:#fff;border:none;border-radius:7px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.add-btn:hover{background:#0f2a45}
.qty-ctrl{width:100%;display:flex;align-items:center;gap:6px}
.qty-ctrl button{background:var(--yellow);color:#000;border:none;border-radius:6px;width:36px;height:36px;font-size:18px;font-weight:800;cursor:pointer;flex-shrink:0;transition:background .15s}
.qty-ctrl button:hover{background:var(--yellow2)}
.qty-ctrl .qty-num{flex:1;text-align:center;font-size:15px;font-weight:800;background:var(--bg);border-radius:6px;height:36px;display:flex;align-items:center;justify-content:center}

/* NO RESULTS */
.no-results{text-align:center;padding:80px 20px;color:var(--muted);grid-column:1/-1}
.no-results .nr-icon{font-size:48px;margin-bottom:12px;display:block}

/* LOAD MORE */
.load-more-wrap{text-align:center;margin:24px 0;grid-column:1/-1}
.load-more-btn{background:var(--white);border:1.5px solid var(--border);color:var(--muted);padding:11px 28px;border-radius:8px;cursor:pointer;font-size:14px;transition:all .15s}
.load-more-btn:hover{border-color:var(--blue);color:var(--blue)}

/* CART DRAWER */
#scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1500}
#scrim.open{display:block}
#cartDrawer{position:fixed;right:-440px;top:0;bottom:0;width:420px;max-width:100vw;background:var(--white);z-index:1501;display:flex;flex-direction:column;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-6px 0 30px rgba(0,0,0,.15)}
#cartDrawer.open{right:0}
.cart-hdr{background:var(--blue);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.cart-hdr h2{font-size:17px;font-weight:700}
.xcart{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:6px;cursor:pointer;font-size:18px}
.xcart:hover{background:rgba(255,255,255,.25)}
#cartItems{flex:1;overflow-y:auto;padding:12px 16px}
.ci{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.ci:last-child{border-bottom:none}
.ci-img{width:52px;height:52px;object-fit:contain;border-radius:6px;background:#fff;padding:4px;flex-shrink:0;border:1px solid var(--border)}
.ci-img.no-img{display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;background:var(--light)}
.ci-info{flex:1;min-width:0}
.ci-code{font-size:10px;color:#aaa}
.ci-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-unit{font-size:12px;color:var(--muted)}
.ci-ctrl{display:flex;align-items:center;gap:4px;flex-shrink:0}
.ci-ctrl button{background:var(--yellow);color:#000;border:none;border-radius:4px;width:24px;height:24px;cursor:pointer;font-size:14px;font-weight:700}
.ci-ctrl span{font-size:13px;font-weight:700;min-width:20px;text-align:center}
.ci-sub{font-size:13px;font-weight:700;color:var(--blue);white-space:nowrap;flex-shrink:0}
.rmbtn{background:none;border:none;color:#ccc;cursor:pointer;font-size:15px;padding:3px}
.rmbtn:hover{color:#e44}
.cart-empty{text-align:center;padding:60px 20px;color:#bbb;font-size:14px;line-height:2}
.cart-empty .ce-icon{font-size:48px;display:block;margin-bottom:8px}
.cart-ftr{border-top:2px solid #f0f0f0;padding:16px 20px;flex-shrink:0}
.total-row{display:flex;justify-content:space-between;font-size:17px;font-weight:800;color:var(--blue);margin-bottom:14px}
.finbtn{width:100%;background:var(--yellow);color:#000;border:none;border-radius:8px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;transition:background .2s;margin-bottom:8px}
.finbtn:hover{background:var(--yellow2)}
.clrbtn{width:100%;background:none;border:1px solid #e8e8e8;color:#aaa;border-radius:7px;padding:8px;font-size:12px;cursor:pointer}
.clrbtn:hover{border-color:#e44;color:#e44}

/* ORDER MODAL */
#orderModal{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:20px}
#orderModal.open{display:flex}
.obox{background:#fff;border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:26px;animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.obox h2{font-size:18px;color:var(--blue);margin-bottom:14px;font-weight:700}
.osum{background:#f7f7f7;border-radius:8px;padding:12px;margin-bottom:14px;max-height:120px;overflow-y:auto;font-size:13px}
.osi{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #ececec;gap:8px}
.osi:last-child{border-bottom:none;font-weight:700;color:var(--blue);padding-top:7px;margin-top:3px}
.osi span:first-child{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:11px;font-weight:700;color:#999;margin-bottom:4px;text-transform:uppercase;letter-spacing:.7px}
.fg input,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid #e8e8e8;border-radius:7px;font-size:14px;outline:none;font-family:inherit;transition:border-color .2s}
.fg input:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mbtns{display:flex;gap:8px;margin-top:14px}
.bcnl{flex:1;background:none;border:1.5px solid #e8e8e8;color:#888;padding:11px;border-radius:7px;cursor:pointer;font-size:14px}
.bok{flex:2;background:var(--blue);color:#fff;border:none;padding:11px;border-radius:7px;cursor:pointer;font-size:14px;font-weight:700}
.bok:hover{background:#0f2a45}
.sbox{text-align:center;padding:20px 0}
.sbox .si{font-size:54px;display:block;margin-bottom:12px}
.sbox h3{color:#2e7d52;font-size:20px;font-weight:700;margin-bottom:7px}
.sbox p{color:#777;font-size:14px;line-height:1.5;margin-bottom:18px}
.wabtn{display:inline-flex;align-items:center;gap:8px;background:#25d366;color:#fff;text-decoration:none;border-radius:8px;padding:12px 22px;font-weight:700;font-size:14px}
.wabtn:hover{background:#1ebe5d}
.npbtn{display:block;width:100%;margin-top:9px;background:none;border:1.5px solid #e8e8e8;color:#999;border-radius:7px;padding:10px;font-size:13px;cursor:pointer}
.npbtn:hover{border-color:var(--blue);color:var(--blue)}

@media(max-width:600px){
  .header-inner{flex-wrap:wrap;height:auto;padding:10px 14px;gap:8px}
  .search-wrap{order:3;flex:1 1 100%;max-width:100%}
  .store-name{font-size:14px}
  main{padding:12px}
  .card-body{padding:8px}
  .card-name{font-size:12px}
  .card-price{font-size:15px}
  .add-btn{padding:8px;font-size:12px}
}
</style>
</head>
<body>

<div id="loadScreen">
  <div class="load-logo">Catálogo<span>PRO</span></div>
  <div class="spinner"></div>
  <div class="load-bar"><div class="load-fill" id="loadFill"></div></div>
  <div id="loadMsg">Carregando produtos...</div>
</div>

<div id="errScreen">
  <h2>😕 Loja não encontrada</h2>
  <p id="errMsg">Este link pode ter expirado ou a loja foi removida.</p>
</div>

<header>
  <div class="header-inner">
    <div class="store-name" id="storeName">Loja</div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Buscar por nome, código, código de barras...">
    </div>
    <button class="cart-btn" onclick="openCart()">
      🛒 Carrinho <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</header>

<main>
  <div class="stats-bar">
    <span id="statsText"><b>0</b> produtos</span>
  </div>
  <div class="grid" id="productGrid"></div>
</main>

<div id="scrim" onclick="closeCart()"></div>
<div id="cartDrawer">
  <div class="cart-hdr"><h2>🛒 Carrinho</h2><button class="xcart" onclick="closeCart()">✕</button></div>
  <div id="cartItems"></div>
  <div class="cart-ftr" id="cartFtr" style="display:none">
    <div class="total-row"><span>Total</span><span id="cartTot">R$ 0,00</span></div>
    <button class="finbtn" onclick="openOrder()">Finalizar Pedido →</button>
    <button class="clrbtn" onclick="clearCart()">Limpar carrinho</button>
  </div>
</div>

<div id="orderModal">
  <div class="obox">
    <div id="oForm">
      <h2>📋 Finalizar Pedido</h2>
      <div class="osum" id="oSum"></div>
      <div class="frow2">
        <div class="fg"><label>Nome *</label><input id="fName" type="text" placeholder="Seu nome completo"></div>
        <div class="fg"><label>Empresa</label><input id="fCo" type="text" placeholder="Opcional"></div>
      </div>
      <div class="frow2">
        <div class="fg"><label>WhatsApp *</label><input id="fPhone" type="tel" placeholder="(16) 99999-9999"></div>
        <div class="fg"><label>E-mail</label><input id="fEmail" type="email" placeholder="email@exemplo.com"></div>
      </div>
      <div class="fg"><label>Endereço de entrega</label><input id="fAddr" type="text" placeholder="Rua, número, cidade"></div>
      <div class="fg"><label>Observações</label><textarea id="fObs" rows="3" placeholder="Forma de pagamento, prazo..."></textarea></div>
      <div class="mbtns">
        <button class="bcnl" onclick="closeOrder()">Cancelar</button>
        <button class="bok" onclick="confirmOrder()">Confirmar Pedido ✓</button>
      </div>
    </div>
    <div class="sbox" id="oSuccess" style="display:none">
      <span class="si">✅</span>
      <h3>Pedido Registrado!</h3>
      <p>Obrigado! O vendedor entrará em contato em breve.</p>
      <a id="waLink" class="wabtn" target="_blank">💬 Enviar via WhatsApp</a>
      <button class="npbtn" onclick="newOrder()">Fazer novo pedido</button>
    </div>
  </div>
</div>

<script>
var SUPABASE_URL      = 'https://jzparydgucxsqlofhcut.supabase.co';
var SUPABASE_ANON_KEY = 'sb_publishable_YD-57J7SDvla4vKPS45xCg_bNTGJTpu';

var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

var allProducts  = [];
var cart         = {};
var catalog      = null;
var visibleCount = 40;
var searchTerm   = '';
var searchTimer  = null;

function setLoad(msg, pct){
  document.getElementById('loadMsg').textContent  = msg;
  document.getElementById('loadFill').style.width = pct + '%';
}
function showErr(msg){
  document.getElementById('loadScreen').style.display = 'none';
  document.getElementById('errScreen').style.display  = 'flex';
  if(msg) document.getElementById('errMsg').textContent = msg;
}

async function init(){
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('id');
  if(!slug) return showErr('ID da loja não informado na URL.');
  try {
    setLoad('Buscando loja...', 20);
    var {data: cat, error: catErr} = await sb.from('catalogs').select('name,whatsapp').eq('slug',slug).single();
    if(catErr || !cat) return showErr('Loja não encontrada.');
    catalog = {name: cat.name, whatsapp: cat.whatsapp, slug: slug};
    document.getElementById('storeName').textContent = cat.name;
    document.title = cat.name;

    setLoad('Carregando produtos...', 50);
    var {data: products, error: prodErr} = await sb
      .from('catalog_products').select('*').eq('catalog_slug',slug).order('sort_order',{ascending:true});
    if(prodErr) throw new Error(prodErr.message);
    allProducts = products || [];
    setLoad('Pronto!', 100);
    setTimeout(function(){
      document.getElementById('loadScreen').style.display = 'none';
      renderGrid();
    }, 300);
  } catch(e){ showErr(e.message); }
}

function filteredProducts(){
  if(!searchTerm) return allProducts;
  var q = searchTerm.toLowerCase().trim();
  return allProducts.filter(function(p){
    var fields = [p.name||'', p.code||'', p.barcode||'', p.description||''].join(' ').toLowerCase();
    return q.split(/\s+/).every(function(w){ return fields.includes(w); });
  });
}

document.getElementById('searchInput').addEventListener('input', function(e){
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function(){
    searchTerm = val; visibleCount = 40; renderGrid();
  }, 200);
});

function fmt(v){
  if(v == null || v === 0) return null;
  return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function renderGrid(){
  var grid     = document.getElementById('productGrid');
  var filtered = filteredProducts();
  var toShow   = filtered.slice(0, visibleCount);

  document.getElementById('statsText').innerHTML =
    '<b>'+filtered.length+'</b> produto'+(filtered.length!==1?'s':'')+
    (searchTerm?' encontrado'+(filtered.length!==1?'s':''):'');

  grid.innerHTML = '';

  if(!filtered.length){
    grid.innerHTML = '<div class="no-results"><span class="nr-icon">🔍</span>Nenhum produto encontrado para "<b>'+searchTerm+'</b>"</div>';
    return;
  }

  toShow.forEach(function(p){
    var qty = cart[p.id] ? cart[p.id].qty : 0;
    var div = document.createElement('div');
    div.className = 'card';

    var imgHtml = p.image_url
      ? '<img class="card-img" src="'+p.image_url+'" alt="'+p.name+'" loading="lazy" onerror="this.outerHTML=\'<div class=card-img placeholder>📦</div>\'">'
      : '<div class="card-img placeholder">📦</div>';

    var priceHtml = fmt(p.price)
      ? '<div class="card-price">'+fmt(p.price)+'</div>'
      : '<div class="card-price no-price">Consultar preço</div>';

    var btnHtml = qty === 0
      ? '<button class="add-btn" data-id="'+p.id+'"><span>+</span> Adicionar</button>'
      : '<div class="qty-ctrl">'+
          '<button data-id="'+p.id+'" data-d="-1">−</button>'+
          '<div class="qty-num">'+qty+'</div>'+
          '<button data-id="'+p.id+'" data-d="1">+</button>'+
        '</div>';

    div.innerHTML =
      imgHtml+
      '<div class="card-body">'+
        (p.code?'<div class="card-code">#'+p.code+(p.barcode?' · '+p.barcode:'')+'</div>':'')+
        '<div class="card-name">'+p.name+'</div>'+
        (p.description?'<div class="card-desc">'+p.description+'</div>':'')+
        priceHtml+
      '</div>'+
      '<div class="card-footer">'+btnHtml+'</div>';

    grid.appendChild(div);
  });

  if(filtered.length > visibleCount){
    var wrap = document.createElement('div');
    wrap.className = 'load-more-wrap';
    var rem = filtered.length - visibleCount;
    wrap.innerHTML = '<button class="load-more-btn" onclick="loadMore()">Ver mais '+rem+' produto'+(rem!==1?'s':'')+'</button>';
    grid.appendChild(wrap);
  }
}

function loadMore(){ visibleCount += 40; renderGrid(); }

document.getElementById('productGrid').addEventListener('click', function(e){
  var btn = e.target.closest('button'); if(!btn) return;
  var id = btn.getAttribute('data-id'); if(!id) return;
  var d  = btn.getAttribute('data-d');
  if(d !== null) changeQty(id, parseInt(d));
  else addItem(id);
});

function findProduct(id){ return allProducts.find(function(p){ return String(p.id)===String(id); }); }

function addItem(id){
  var p = findProduct(id); if(!p) return;
  if(!cart[id]) cart[id] = {id:p.id, code:p.code, name:p.name, price:p.price||0, image_url:p.image_url, qty:0};
  cart[id].qty++;
  updateBadge(); renderGrid();
}

function changeQty(id, d){
  if(!cart[id]) return;
  cart[id].qty += d;
  if(cart[id].qty <= 0) delete cart[id];
  updateBadge(); renderGrid();
  if(document.getElementById('cartDrawer').classList.contains('open')) renderCart();
}

function updateBadge(){
  var n = 0; for(var k in cart) n += cart[k].qty;
  document.getElementById('cartBadge').textContent = n;
}

function renderCart(){
  var items = document.getElementById('cartItems');
  var ftr   = document.getElementById('cartFtr');
  var keys  = Object.keys(cart);
  if(!keys.length){
    items.innerHTML = '<div class="cart-empty"><span class="ce-icon">🛒</span>Carrinho vazio.<br>Adicione produtos da loja.</div>';
    ftr.style.display = 'none'; return;
  }
  ftr.style.display = 'flex'; ftr.style.flexDirection = 'column';
  items.innerHTML = '';
  var total = 0;
  keys.forEach(function(id){
    var it = cart[id], sub = it.price * it.qty; total += sub;
    var div = document.createElement('div'); div.className = 'ci';
    var imgH = it.image_url
      ? '<img class="ci-img" src="'+it.image_url+'" alt="'+it.name+'" onerror="this.outerHTML=\'<div class=ci-img no-img>📦</div>\'">'
      : '<div class="ci-img no-img">📦</div>';
    div.innerHTML =
      imgH+
      '<div class="ci-info">'+
        (it.code?'<div class="ci-code">#'+it.code+'</div>':'')+
        '<div class="ci-name">'+it.name+'</div>'+
        '<div class="ci-unit">'+(it.price?fmt(it.price)+' / un.':'Preço a confirmar')+'</div>'+
      '</div>'+
      '<div class="ci-ctrl">'+
        '<button data-cc="'+id+'" data-cd="-1">−</button>'+
        '<span>'+it.qty+'</span>'+
        '<button data-cc="'+id+'" data-cd="1">+</button>'+
      '</div>'+
      '<div class="ci-sub">'+(it.price?fmt(sub):'—')+'</div>'+
      '<button class="rmbtn" data-rm="'+id+'">🗑</button>';
    items.appendChild(div);
  });
  document.getElementById('cartTot').textContent = total > 0 ? fmt(total) : 'A confirmar';
}

document.getElementById('cartItems').addEventListener('click', function(e){
  var b = e.target.closest('button'); if(!b) return;
  var rm=b.getAttribute('data-rm'), cc=b.getAttribute('data-cc'), cd=b.getAttribute('data-cd');
  if(rm){ delete cart[rm]; updateBadge(); renderCart(); renderGrid(); }
  else if(cc){ changeQty(cc, parseInt(cd)); renderCart(); }
});

function openCart(){ document.getElementById('scrim').classList.add('open'); document.getElementById('cartDrawer').classList.add('open'); renderCart(); }
function closeCart(){ document.getElementById('scrim').classList.remove('open'); document.getElementById('cartDrawer').classList.remove('open'); }
function clearCart(){ if(!confirm('Limpar carrinho?')) return; cart={}; updateBadge(); renderCart(); renderGrid(); }

function openOrder(){
  closeCart();
  var sum = document.getElementById('oSum'); sum.innerHTML = '';
  var total = 0;
  Object.keys(cart).forEach(function(id){
    var it=cart[id], sub=it.price*it.qty; total+=sub;
    var row=document.createElement('div'); row.className='osi';
    row.innerHTML='<span>'+it.qty+'x '+it.name.slice(0,40)+'</span><span>'+(it.price?fmt(sub):'—')+'</span>';
    sum.appendChild(row);
  });
  var tr=document.createElement('div'); tr.className='osi';
  tr.innerHTML='<span>TOTAL</span><span>'+(total>0?fmt(total):'A confirmar')+'</span>';
  sum.appendChild(tr);
  document.getElementById('oForm').style.display='block';
  document.getElementById('oSuccess').style.display='none';
  document.getElementById('orderModal').classList.add('open');
}
function closeOrder(){ document.getElementById('orderModal').classList.remove('open'); }

function confirmOrder(){
  var name=document.getElementById('fName').value.trim();
  var phone=document.getElementById('fPhone').value.trim();
  if(!name){alert('Informe seu nome.');return;}
  if(!phone){alert('Informe seu WhatsApp.');return;}
  var msg='*NOVO PEDIDO — '+catalog.name+'*\n\n';
  msg+='*Cliente:* '+name+'\n';
  var co=document.getElementById('fCo').value.trim(); if(co) msg+='*Empresa:* '+co+'\n';
  msg+='*WhatsApp:* '+phone+'\n';
  var em=document.getElementById('fEmail').value.trim(); if(em) msg+='*E-mail:* '+em+'\n';
  var ad=document.getElementById('fAddr').value.trim(); if(ad) msg+='*Endereço:* '+ad+'\n';
  msg+='\n*ITENS:*\n';
  var total=0;
  Object.keys(cart).forEach(function(id){
    var it=cart[id], sub=it.price*it.qty; total+=sub;
    msg+='• '+it.qty+'x ';
    if(it.code) msg+='#'+it.code+' ';
    msg+=it.name;
    if(it.price) msg+=' — '+fmt(sub);
    msg+='\n';
  });
  if(total>0) msg+='\n*TOTAL: '+fmt(total)+'*';
  else msg+='\n*Valores a confirmar com o vendedor*';
  var obs=document.getElementById('fObs').value.trim(); if(obs) msg+='\n\n*Obs:* '+obs;
  document.getElementById('waLink').href='https://wa.me/'+catalog.whatsapp+'?text='+encodeURIComponent(msg);
  document.getElementById('oForm').style.display='none';
  document.getElementById('oSuccess').style.display='block';
}

function newOrder(){ closeOrder(); cart={}; updateBadge(); renderGrid(); }

init();
</script>
</body>
</html>
